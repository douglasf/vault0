name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

  build:
    needs: validate
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact: vault0-linux-x64
            ext: ""
          - os: ubuntu-24.04-arm
            artifact: vault0-linux-arm64
            ext: ""
          - os: macos-latest
            artifact: vault0-darwin-arm64
            ext: ""
          - os: macos-15-intel
            artifact: vault0-darwin-x64
            ext: ""
          - os: windows-latest
            artifact: vault0-windows-x64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build binary
        run: bun build --compile --minify src/index.tsx --outfile ${{ matrix.artifact }}${{ matrix.ext }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ${{ matrix.artifact }}.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes \
            artifacts/vault0-linux-x64/vault0-linux-x64.tar.gz \
            artifacts/vault0-linux-arm64/vault0-linux-arm64.tar.gz \
            artifacts/vault0-darwin-arm64/vault0-darwin-arm64.tar.gz \
            artifacts/vault0-darwin-x64/vault0-darwin-x64.tar.gz \
            artifacts/vault0-windows-x64/vault0-windows-x64.zip
