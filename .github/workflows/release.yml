name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install cross-platform native modules
        run: |
          bun add --no-save \
            @opentui/core-darwin-x64@0.1.81 \
            @opentui/core-darwin-arm64@0.1.81 \
            @opentui/core-linux-x64@0.1.81 \
            @opentui/core-linux-arm64@0.1.81 \
            @opentui/core-win32-x64@0.1.81 \
            @opentui/core-win32-arm64@0.1.81

      - name: Strip platform constraints for cross-compilation
        run: |
          for pkg in node_modules/@opentui/core-*/package.json; do
            jq 'del(.os, .cpu)' "$pkg" > "$pkg.tmp" && mv "$pkg.tmp" "$pkg"
          done

      - name: Build binaries
        run: |
          # The @opentui/core bundle uses a dynamic template-literal import to load
          # platform-specific native modules:
          #   await import(`@opentui/core-${process.platform}-${process.arch}/index.ts`)
          # Bun's bundler cannot resolve template-literal imports for cross-compilation
          # targets even with --define, because it doesn't fold them into static strings
          # for module resolution. We fix this by patching the dynamic import to a static
          # one for each target platform before building.
          CORE_JS="node_modules/@opentui/core/index-ve2seej0.js"
          CORE_JS_ORIG="${CORE_JS}.orig"
          cp "$CORE_JS" "$CORE_JS_ORIG"

          build_target() {
            local platform=$1 arch=$2 bun_target=$3 outfile=$4
            # Restore original, then patch the dynamic import to a static one
            cp "$CORE_JS_ORIG" "$CORE_JS"
            sed -i "s|import(\`@opentui/core-\${process.platform}-\${process.arch}/index.ts\`)|import(\"@opentui/core-${platform}-${arch}/index.ts\")|g" "$CORE_JS"
            bun build --compile --minify --target="$bun_target" \
              --define process.platform="'\"${platform}\"'" \
              --define process.arch="'\"${arch}\"'" \
              ./src/index.tsx --outfile "$outfile"
          }

          build_target linux  x64   bun-linux-x64     vault0-linux-x64
          build_target linux  arm64 bun-linux-arm64   vault0-linux-arm64
          build_target darwin x64   bun-darwin-x64    vault0-darwin-x64
          build_target darwin arm64 bun-darwin-arm64  vault0-darwin-arm64
          build_target win32  x64   bun-windows-x64   vault0-windows-x64.exe

          # Restore original source
          mv "$CORE_JS_ORIG" "$CORE_JS"

      - name: Package archives
        run: |
          tar czf vault0-linux-x64.tar.gz vault0-linux-x64
          tar czf vault0-linux-arm64.tar.gz vault0-linux-arm64
          tar czf vault0-darwin-x64.tar.gz vault0-darwin-x64
          tar czf vault0-darwin-arm64.tar.gz vault0-darwin-arm64
          zip vault0-windows-x64.zip vault0-windows-x64.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --generate-notes \
            vault0-linux-x64.tar.gz \
            vault0-linux-arm64.tar.gz \
            vault0-darwin-x64.tar.gz \
            vault0-darwin-arm64.tar.gz \
            vault0-windows-x64.zip
