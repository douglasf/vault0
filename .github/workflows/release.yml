name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install cross-platform native modules
        run: |
          bun add --no-save \
            @opentui/core-darwin-x64@0.1.81 \
            @opentui/core-darwin-arm64@0.1.81 \
            @opentui/core-linux-x64@0.1.81 \
            @opentui/core-linux-arm64@0.1.81 \
            @opentui/core-win32-x64@0.1.81 \
            @opentui/core-win32-arm64@0.1.81

      - name: Strip platform constraints for cross-compilation
        run: |
          for pkg in node_modules/@opentui/core-*/package.json; do
            jq 'del(.os, .cpu)' "$pkg" > "$pkg.tmp" && mv "$pkg.tmp" "$pkg"
          done

      - name: Build binaries
        run: |
          bun build --compile --minify --target=bun-linux-x64 --define process.platform='"linux"' --define process.arch='"x64"' ./src/index.tsx --outfile vault0-linux-x64
          bun build --compile --minify --target=bun-linux-arm64 --define process.platform='"linux"' --define process.arch='"arm64"' ./src/index.tsx --outfile vault0-linux-arm64
          bun build --compile --minify --target=bun-darwin-x64 --define process.platform='"darwin"' --define process.arch='"x64"' ./src/index.tsx --outfile vault0-darwin-x64
          bun build --compile --minify --target=bun-darwin-arm64 --define process.platform='"darwin"' --define process.arch='"arm64"' ./src/index.tsx --outfile vault0-darwin-arm64
          bun build --compile --minify --target=bun-windows-x64 --define process.platform='"win32"' --define process.arch='"x64"' ./src/index.tsx --outfile vault0-windows-x64.exe

      - name: Package archives
        run: |
          tar czf vault0-linux-x64.tar.gz vault0-linux-x64
          tar czf vault0-linux-arm64.tar.gz vault0-linux-arm64
          tar czf vault0-darwin-x64.tar.gz vault0-darwin-x64
          tar czf vault0-darwin-arm64.tar.gz vault0-darwin-arm64
          zip vault0-windows-x64.zip vault0-windows-x64.exe

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --generate-notes \
            vault0-linux-x64.tar.gz \
            vault0-linux-arm64.tar.gz \
            vault0-darwin-x64.tar.gz \
            vault0-darwin-arm64.tar.gz \
            vault0-windows-x64.zip
